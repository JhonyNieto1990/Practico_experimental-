<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Crunch House</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    {% block customCSS %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4" style="background-color: #007bff;">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
          <img src="{{ url_for('static', filename='img/crunch_house_logo.png') }}" alt="Crunch House" height="50" class="me-2">
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('home') }}"><i class="fas fa-home"></i> Inicio</a></li>
            <li class="nav-item"><a class="nav-link px-3" href="{{ url_for('listar_productos') }}"><i class="fas fa-boxes"></i> Inventario</a></li>
            <li class="nav-item">
                <a class="btn btn-light text-primary fw-bold ms-lg-3 px-4 rounded-pill shadow-sm" href="{{ url_for('logout') }}">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid min-vh-100">
        {% block body %}
        {% endblock %}
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-1">&copy; 2026 Crunch House | Puyo - Ecuador</p>
            <div class="small text-muted">
                <i class="fab fa-facebook me-2"></i>
                <i class="fab fa-instagram me-2"></i>
                <i class="fas fa-phone"></i> +593 99 999 9999
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
